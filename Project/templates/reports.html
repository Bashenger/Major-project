<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Reports | AI Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .sidebar { background-color: #1e293b; min-height: 100vh; padding: 2rem 1rem; border-right: 1px solid #334155; }
        .report-table { background: rgba(30, 41, 59, 0.7); border-radius: 1rem; overflow: hidden; }
        th { color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <h4 class="text-danger fw-bold mb-4">🛡️ AI GUARD</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a href="/" class="nav-link text-secondary">🏠 Dashboard</a></li>
                    <li class="nav-item mb-2"><a href="/reports" class="nav-link text-white active">📄 Reports</a></li>
                    <li class="nav-item mb-2"><a href="/team" class="nav-link text-secondary">👥 Team</a></li>
                </ul>
            </nav>
            <main class="col-md-10 p-5">
                <h2 class="fw-bold mb-4">Analysis History</h2>
                <div class="report-table p-4">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>Scan ID</th>
                                <th>File Name</th>
                                <th>Result</th>
                                <th>Confidence</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>VG-4829</td>
                                <td>sample_call_01.wav</td>
                                <td class="text-danger">AI CLONE</td>
                                <td>98.4%</td>
                                <td><span class="badge bg-danger">Flagged</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
