<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Guard | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .sidebar { background-color: #1e293b; min-height: 100vh; padding: 2rem 1rem; border-right: 1px solid #334155; }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1rem; padding: 2rem; 
        }
        .btn-ai { background-color: #ef4444; border: none; font-weight: 600; transition: 0.3s; color: white; }
        .btn-ai:hover { background-color: #dc2626; transform: translateY(-2px); color: white; }
        .metric-card { text-align: center; border-left: 4px solid #ef4444; padding: 10px; background: #1e293b; border-radius: 8px; }

        /* --- SCANNING OVERLAY (GPU OPTIMIZED) --- */
        #scan-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; 
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .scanner-container {
            width: 300px;
            height: 180px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(30, 41, 59, 0.5);
        }

        .scan-line {
            width: 100%;
            height: 3px;
            background: #ef4444;
            box-shadow: 0 0 20px #ef4444;
            position: absolute;
            top: 0;
            /* Hardware Acceleration */
            transform: translate3d(0, 0, 0);
            animation: moveScan 2.5s infinite ease-in-out;
        }

        @keyframes moveScan {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, 180px, 0); }
        }

        .loading-text {
            margin-top: 25px;
            font-weight: 800;
            color: #ef4444;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="scan-overlay">
        <div class="scanner-container">
            <div class="scan-line"></div>
        </div>
        <div class="loading-text" id="status-msg">INITIALIZING SCAN...</div>
        <div class="text-secondary small mt-2">Major Project Analysis Pipeline</div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar shadow">
                <h4 class="text-danger fw-bold mb-4">🛡️ AI GUARD</h4>
                <p class="small text-secondary">Major Project - BCA 2026</p>
                <hr class="text-secondary">
                <ul class="nav flex-column">
                     <li class="nav-item mb-2">
                        <a href="/" class="nav-link text-white active">🏠 Dashboard</a>
                    </li>
    
                    <li class="nav-item mb-2">
                         <a href="/reports" class="nav-link text-secondary">📄 Reports</a>
                    </li>
    
                    <li class="nav-item mb-2">
                        <a href="/team" class="nav-link text-secondary">👥 Team</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom border-secondary">
                    <h1 class="h2 fw-bold">Voice Analysis Dashboard</h1>
                </div>

                <div class="row gap-4">
                    <div class="col-lg-7">
                        <div class="glass-card shadow-lg">
                            <h5 class="mb-4">📥 Scan Call Recording</h5>
                            <form id="analysis-form" action="/analyze" method="POST" enctype="multipart/form-data">
                                <div class="mb-4">
                                    <label class="form-label text-secondary small">Supported formats: .wav, .mp3</label>
                                    <input type="file" name="audio_file" class="form-control bg-dark text-white border-secondary" required>
                                </div>
                                <button type="submit" class="btn btn-ai w-100 py-3">Run AI Analysis</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="metric-card mb-3">
                            <small class="text-secondary uppercase">System Status</small>
                            <h3 class="text-success mb-0">Active</h3>
                        </div>
                        <div class="metric-card mb-3" style="border-left-color: #3b82f6;">
                            <small class="text-secondary uppercase">Last Analysis</small>
                            <h3 class="mb-0">Ready</h3>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysis-form');
        const overlay = document.getElementById('scan-overlay');
        const statusMsg = document.getElementById('status-msg');

        const steps = [
            "EXTRACTING FEATURES...",
            "ANALYZING SPECTRUM...",
            "IDENTIFYING CLONES...",
            "FINALIZING..."
        ];

        form.onsubmit = function(e) {
            e.preventDefault(); // Pause to show animation
            overlay.style.display = 'flex';
            
            let i = 0;
            setInterval(() => {
                statusMsg.innerText = steps[i % steps.length];
                i++;
            }, 1200);

            setTimeout(() => {
                form.submit(); // Actually send the file
            }, 150);
        };
    </script>
</body>
</html>
