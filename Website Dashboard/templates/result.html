<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Result | AI Voice Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.7.7/wavesurfer.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; }
        .result-card { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border-radius: 2rem; padding: 3rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .confidence { font-size: 4rem; font-weight: 800; color: #ef4444; line-height: 1; }
        .status-badge { padding: 8px 20px; border-radius: 50px; font-weight: bold; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        
        /* Waveform Container Styling */
        #waveform-box {
            background: #0b1120;
            border-radius: 1.5rem;
            padding: 25px;
            margin: 25px 0;
            border: 1px solid #334155;
            min-height: 160px;
        }
        
        #waveform { width: 100%; height: 100px; }

        .play-btn { 
            background: #ef4444; border: none; color: white; padding: 12px 35px; 
            border-radius: 50px; font-weight: bold; margin-top: 15px;
            transition: 0.3s;
        }
        .play-btn:hover { background: #dc2626; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="result-card mx-auto shadow-lg" style="max-width: 650px;">
            <div class="status-badge mb-3">⚠️ SCAN COMPLETE</div>
            
            <h1 class="h6 text-secondary text-uppercase tracking-widest mb-3">Detection Confidence</h1>
            <div class="confidence mb-2">{{ result.confidence }}%</div>
            <h2 class="h4 mb-4 text-uppercase">{{ result.label }}</h2>

            <div id="waveform-box">
                <p id="wf-status" class="small text-secondary text-uppercase mb-3">Initializing Acoustic Spectrum...</p>
                <div id="waveform"></div>
                <button id="playPause" class="play-btn" style="display:none;">▶ PLAY ANALYSIS AUDIO</button>
            </div>

            <div class="d-flex justify-content-between text-secondary small px-2">
                <span>ID: VG-{{ range(1000, 9999) | random }}</span>
                <span>File: {{ result.filename }}</span>
            </div>
            
            <hr class="border-secondary my-4">
            
            <div class="d-grid">
                <a href="/" class="btn btn-outline-light py-3 rounded-pill">SCAN ANOTHER RECORDING</a>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const status = document.getElementById('wf-status');
            const playBtn = document.getElementById('playPause');

            const wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#475569',      // Slate grey background
                progressColor: '#ef4444',  // Red progress to match theme
                cursorColor: '#ffffff',
                barWidth: 3,
                barGap: 3,
                barRadius: 4,
                height: 100,
                // Direct path to the uploaded file
                url: "/static/uploads/{{ result.filename }}",
            });

            // Show UI elements once audio is ready
            wavesurfer.on('ready', () => {
                status.innerText = "Acoustic Signature Analyzed";
                playBtn.style.display = "inline-block";
            });

            // Error handling
            wavesurfer.on('error', (e) => {
                status.innerText = "Error: Audio spectrum could not be rendered";
                console.error(e);
            });

            // Playback controls
            playBtn.onclick = () => wavesurfer.playPause();
            
            wavesurfer.on('play', () => playBtn.innerText = "⏸ PAUSE");
            wavesurfer.on('pause', () => playBtn.innerText = "▶ PLAY ANALYSIS AUDIO");
            wavesurfer.on('finish', () => playBtn.innerText = "▶ PLAY ANALYSIS AUDIO");
        };
    </script>
</body>
</html>
